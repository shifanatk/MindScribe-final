########################################
# MindScribe Backend - Application Config
# MongoDB Atlas = Users/Profiles (primary).
# H2 (file-based) = Journal entries (secondary, local file).
########################################

# ==============================
# Server
# ==============================
server.port=8080

# ==============================
# MongoDB Atlas (Primary) - User & Profile data
# Replace the placeholder below with your actual Atlas URI.
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=mindscribe

# ==============================
# H2 (Secondary) - Journal entries only, file-based, persistent
# Using DB_CLOSE_DELAY=-1 to keep database connections open longer
# ==============================
spring.datasource.h2.url=jdbc:h2:file:./data/mindscribe;DB_CLOSE_DELAY=-1
spring.datasource.h2.driver-class-name=org.h2.Driver
spring.datasource.h2.username=sa
spring.datasource.h2.password=

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ==============================
# JPA / Hibernate (defaults; overridden per EMF in DataSourceConfig)
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# Mail (crisis alert; optional – leave empty to disable sending)
# ==============================
# spring.mail.host=smtp.example.com
# spring.mail.port=587
# spring.mail.username=
# spring.mail.password=
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
mindscribe.crisis.alert.enabled=false
mindscribe.crisis.alert.to=alert@example.com

# ==============================
# Logging
# ==============================
logging.level.org.springframework.security=DEBUG
logging.level.com.mindscribe=DEBUG
